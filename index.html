<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>純粋 Möbius ZKP 認証</title>
    <script src="logic.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .log { background: #333; color: #0f0; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; }
        button { padding: 10px; margin: 5px 0; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h2>ハッシュゼロ・対話型ZKP</h2>
    <input type="text" id="user" placeholder="ユーザー名" style="width:100%; padding:8px; margin-bottom:10px;">
    <input type="password" id="pass" placeholder="パスワード" style="width:100%; padding:8px; margin-bottom:10px;">
    
    <button onclick="doSignup()" style="background:#e1f5fe;">1. 登録</button>
    <button onclick="doLogin()" style="background:#c8e6c9;">2. ZKP認証実行</button>

    <div class="log" id="log">ログがここに表示されます...</div>

    <script>
        const SERVER = "https://my-zkp-auth.onrender.com/api";
        const salt = new Uint8Array([10, 20, 30, 40]); // 固定ソルト

        function logger(m) { document.getElementById('log').innerHTML += `<br>> ${m}`; }

        async function doSignup() {
            const user = document.getElementById('user').value;
            const v = deriveVFromMoebius(document.getElementById('pass').value, salt);
            const r = BigInt(Math.floor(Math.random() * 1000000000)); // 乱数r
            
            // 公開値 com = g^v * h^r
            const com = (modPow(g, v, MOD) * modPow(h, r, MOD)) % MOD;

            await fetch(`${SERVER}/signup`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, salt: "0a141e28", com: com.toString(), r: r.toString() })
            });
            logger(`登録完了: ${user} (com生成完了)`);
        }

        async function doLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            
            // クライアント側で v を再計算
            const v = deriveVFromMoebius(pass, salt);
            
            // 本来 r は登録時にクライアント側で保存しておくべきもの
            // 今回は簡易化のため固定/DBから取得する形を想定
            const r = 123456789n; // ※ここをsignup時のrと合わせる必要があります

            // --- Step 1: Commitment (t) ---
            const kv = BigInt(Math.floor(Math.random() * 1000000));
            const kr = BigInt(Math.floor(Math.random() * 1000000));
            const t = (modPow(g, kv, MOD) * modPow(h, kr, MOD)) % MOD;

            // --- Step 2: Challenge (e) ---
            const res = await fetch(`${SERVER}/login/challenge`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, t: t.toString() })
            });
            const { e } = await res.json();
            logger(`チャレンジ受信: e=${e}`);

            // --- Step 3: Response (s_v, s_r) ---
            const sv = (kv + BigInt(e) * v) % ORDER;
            const sr = (kr + BigInt(e) * r) % ORDER;

            // --- Step 4: Verify ---
            const vres = await fetch(`${SERVER}/login/verify`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, s_v: sv.toString(), s_r: sr.toString() })
            });
            const { success } = await vres.json();
            logger(success ? "認証成功！ (ZKP完了)" : "認証失敗 (パスワードが違います)");
        }
    </script>
</body>
</html>
