<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>純粋・対話型 Möbius ZKP 認証</title>
  <script src="logic.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; line-height: 1.6; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.2rem; margin-top: 1.5em; }
    label { display: block; margin-top: 0.5em; }
    input[type="text"], input[type="password"] { width: 300px; padding: 4px; }
    button { margin-top: 0.7em; padding: 4px 10px; }
    pre { background: #f5f5f5; padding: 8px; white-space: pre-wrap; word-break: break-all; }
    .section { border: 1px solid #ddd; padding: 10px; margin-top: 1em; }
  </style>
</head>
<body>
  <h1>純粋・対話型 Möbius ZKP 認証（サーバー連携版）</h1>

  <div class="section">
    <h2>[0] 登録フェーズ（Signup）</h2>
    <label>ユーザー名: <input type="text" id="reg-user" value="alice" /></label>
    <label>パスワード: <input type="password" id="reg-pass" value="Möbius-Logic-2026" /></label>
    <button onclick="handleSignup()">登録する</button>
    <pre id="reg-log"></pre>
  </div>

  <div class="section">
    <h2>[1] 認証フェーズ（Login / ZKP）</h2>
    <label>ユーザー名: <input type="text" id="login-user" value="alice" /></label>
    <label>パスワード: <input type="password" id="login-pass" value="Möbius-Logic-2026" /></label>
    <button onclick="handleLogin()">ZK 認証を実行</button>
    <pre id="login-log"></pre>
  </div>

  <script>
    const SERVER = "https://my-zkp-auth.onrender.com/api";

    async function handleSignup() {
      const user = document.getElementById('reg-user').value;
      const pass = document.getElementById('reg-pass').value;
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2, '0')).join('');
      
      const v = deriveVFromMoebius(pass, salt);
      const r = BigInt("0x" + Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2, '0')).join('')) % window.ORDER;
      const com = (modPow(window.g, v, window.MOD) * modPow(window.h, r, window.MOD)) % window.MOD;

      await fetch(`${SERVER}/signup`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username: user, salt: saltHex, com: com.toString(), r: r.toString() })
      });
      document.getElementById('reg-log').innerText = "登録完了。サーバーに公開値を保存しました。";
    }

    async function handleLogin() {
      const user = document.getElementById('login-user').value;
      const pass = document.getElementById('login-pass').value;

      const kv = BigInt("0x" + Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2, '0')).join('')) % window.ORDER;
      const kr = BigInt("0x" + Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2, '0')).join('')) % window.ORDER;
      const t = (modPow(window.g, kv, window.MOD) * modPow(window.h, kr, window.MOD)) % window.MOD;

      const res = await fetch(`${SERVER}/login/challenge`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username: user, t: t.toString() })
      });
      const { e, r, salt } = await res.json();
      
      const saltBytes = new Uint8Array(salt.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
      const v = deriveVFromMoebius(pass, saltBytes);
      const sv = (kv + BigInt(e) * v) % window.ORDER;
      const sr = (kr + BigInt(e) * BigInt(r)) % window.ORDER;

      const vres = await fetch(`${SERVER}/login/verify`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username: user, s_v: sv.toString(), s_r: sr.toString() })
      });
      const { success } = await vres.json();
      document.getElementById('login-log').innerText = success ? "検証成功: あなたは本人です。" : "検証失敗: パスワードが違います。";
    }
  </script>
</body>
</html>
