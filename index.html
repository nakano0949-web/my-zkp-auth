<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>純粋 Möbius ZKP 認証</title>
    <script src="logic.js"></script>
</head>
<body>
    <h2>ハッシュゼロ・対話型ZKP</h2>
    <input type="text" id="user" placeholder="ユーザー名" style="width:100%; padding:8px; margin-bottom:10px;">
    <input type="password" id="pass" placeholder="パスワード" style="width:100%; padding:8px; margin-bottom:10px;">
    
    <button onclick="doSignup()">1. 登録</button>
    <button onclick="doLogin()">2. ZKP認証実行</button>

    <div id="log" style="background:#eee; padding:10px; margin-top:10px; min-height:100px; font-family:monospace;"></div>

    <script>
        const SERVER = "https://my-zkp-auth.onrender.com/api";
        const salt = new Uint8Array([10, 20, 30, 40]);

        function logger(m) { document.getElementById('log').innerHTML += `<br>> ${m}`; }

        async function doSignup() {
            try {
                const username = document.getElementById('user').value;
                const password = document.getElementById('pass').value;
                if(!username || !password) return alert("入力してください");

                logger("計算中...");
                const v = deriveVFromMoebius(password, salt);
                const r = BigInt(Math.floor(Math.random() * 100000000));
                
                // logic.js の関数と定数を使用
                const com = (modPow(window.g, v, window.MOD) * modPow(window.h, r, window.MOD)) % window.MOD;

                logger("サーバーに送信中...");
                const res = await fetch(`${SERVER}/signup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        username: username, 
                        salt: "0a141e28", 
                        com: com.toString() 
                    })
                });
                
                if(res.ok) logger("登録成功！");
                else logger("サーバーエラー");
            } catch (e) {
                logger("エラー発生: " + e.message);
            }
        }

        async function doLogin() {
            // ログイン処理も同様に window. をつけて修正
            try {
                const user = document.getElementById('user').value;
                const pass = document.getElementById('pass').value;
                const v = deriveVFromMoebius(pass, salt);
                const r = 123456789n; // デモ用固定値

                const kv = BigInt(Math.floor(Math.random() * 1000000));
                const kr = BigInt(Math.floor(Math.random() * 1000000));
                const t = (modPow(window.g, kv, window.MOD) * modPow(window.h, kr, window.MOD)) % window.MOD;

                const res = await fetch(`${SERVER}/login/challenge`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, t: t.toString() })
                });
                const { e } = await res.json();

                const sv = (kv + BigInt(e) * v) % window.ORDER;
                const sr = (kr + BigInt(e) * r) % window.ORDER;

                const vres = await fetch(`${SERVER}/login/verify`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, s_v: sv.toString(), s_r: sr.toString() })
                });
                const { success } = await vres.json();
                logger(success ? "認証成功！" : "認証失敗");
            } catch (e) {
                logger("エラー: " + e.message);
            }
        }
    </script>
</body>
</html>
